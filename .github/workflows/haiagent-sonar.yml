name: HaiAgent SonarQube Analysis
on:
  workflow_dispatch:
    inputs:
      sonar_project_key:
        description: SonarQube project / component key
        required: true

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarQube scan
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=${{ github.event.inputs.sonar_project_key }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -DskipTests=false
        env:
          JAVA_OPTS: -Xmx2g
